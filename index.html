<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }

        /* Navbar */
        .navbar {
            background: #0d6efd;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
        }

        /* Hero Section */
        .hero {
            background: #f4f4f4;
            padding: 80px 20px;
            text-align: center;
        }

        .hero h1 {
            font-size: 40px;
        }

        .btn {
            background: #0d6efd;
            color: white;
            padding: 10px 20px;
            border: none;
            text-decoration: none;
            border-radius: 5px;
        }

        /* Sections */
        .section {
            padding: 50px 20px;
            text-align: center;
        }

        .services {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .card {
            background: #fff;
            padding: 20px;
            width: 200px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        /* Contact */
        input, textarea {
            width: 80%;
            padding: 10px;
            margin: 10px 0;
        }

        /* Footer */
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <h2>My Website</h2>
        <div>
            <a href="#">Home</a>
            <a href="#about">About</a>
            <a href="#services">Services</a>
            <a href="#contact">Contact</a>
        </div>
    </div>

    <!-- Hero -->
    <div class="hero">
        <h1>Welcome to My Website</h1>
        <p>Simple and clean HTML website deployed on Azure</p>
        <a class="btn" href="#contact">Get Started</a>
    </div>

    <!-- About -->
    <div class="section" id="about">
        <h2>About Us</h2>
        <p>This is a simple website built using HTML and CSS.</p>
    </div>

    <!-- Services -->
    <div class="section" id="services">
        <h2>Our Services</h2>
        <div class="services">
            <div class="card">Web Design</div>
            <div class="card">Development</div>
            <div class="card">Hosting</div>
        </div>
    </div>

    <!-- Contact -->
    <div class="section" id="contact">
        <h2>Contact Us</h2>
        <form>
            <input type="text" placeholder="Your Name"><br>
            <input type="email" placeholder="Your Email"><br>
            <textarea rows="5" placeholder="Your Message"></textarea><br>
            <button class="btn">Send</button>
        </form>
    </div>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Website | All Rights Reserved</p>
    </footer>

</body>
</html>
